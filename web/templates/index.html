<!DOCTYPE html>
<html lang="ko" data-theme="retro" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>힙포인사이트 쇼츠 생성기</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<header>
  <div class="header-logo">힙포인사이트</div>
  <div class="header-sub">Shorts 자동 생성기</div>
  <div class="header-space"></div>
  <div class="theme-controls">
    <!-- Style toggle -->
    <div class="theme-group" id="style-group">
      <button onclick="setTheme('retro')"   id="btn-retro"   class="active">레트로</button>
      <button onclick="setTheme('classic')" id="btn-classic"         >클래식</button>
    </div>
    <!-- Mode toggle -->
    <div class="theme-group" id="mode-group">
      <button onclick="setMode('light')" id="btn-light" class="active">☀ 라이트</button>
      <button onclick="setMode('dark')"  id="btn-dark"               >🌙 다크</button>
    </div>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────── -->
<div class="container">
  <div class="grid">

    <!-- ── 뉴스 검색 패널 (좌) ── -->
    <div>
      <div class="card">
        <div class="card-title">🔎 최신 뉴스 검색</div>

        <label class="field-label">주제</label>
        <div class="topic-options">
          <label class="topic-btn">
            <input type="radio" name="news-topic" value="robot" checked>
            <span>🤖 로봇</span>
          </label>
          <label class="topic-btn">
            <input type="radio" name="news-topic" value="ai">
            <span>🧠 AI</span>
          </label>
        </div>

        <button class="btn btn-primary btn-block" onclick="searchNews()" id="btn-news-search">
          🔎 뉴스 검색
        </button>
        <div class="hint" style="margin-top:8px">
          최초 보도일 최신순 정렬. 토글을 누르면 상세 정보가 펼쳐집니다.
        </div>

        <div class="news-list" id="news-list">
          <div class="news-empty">아직 검색하지 않았어요. 주제를 고르고 ‘뉴스 검색’을 누르세요.</div>
        </div>
      </div>
    </div>

    <!-- ── 입력 패널 (가운데) ── -->
    <div>

      <!-- 기사 -->
      <div class="card">
        <div class="card-title">📰 기사 입력</div>
        <label class="field-label">기사 1</label>
        <textarea id="article1" placeholder="기사 내용을 붙여넣으세요..."></textarea>
        <label class="field-label">기사 2</label>
        <textarea id="article2" placeholder="기사 내용을 붙여넣으세요..."></textarea>
        <label class="field-label">기사 3</label>
        <textarea id="article3" placeholder="기사 내용을 붙여넣으세요..."></textarea>
      </div>

      <!-- 영상 링크 -->
      <div class="card">
        <div class="card-title">🎬 참조 영상</div>
        <label class="field-label">유튜브 링크 1 (선택 — 비우면 스크립트 베이스 영상)</label>
        <div class="url-row">
          <input type="url" id="url1" placeholder="https://youtube.com/watch?v=...">
          <input type="text" id="start1" value="00:00:00" placeholder="시작 시간">
        </div>
        <label class="field-label">유튜브 링크 2 (선택)</label>
        <div class="url-row">
          <input type="url" id="url2" placeholder="https://youtube.com/watch?v=...">
          <input type="text" id="start2" value="00:00:00" placeholder="시작 시간">
        </div>
        <label class="field-label">클립 길이 (초)</label>
        <input type="text" id="duration" value="55" style="max-width:80px">
      </div>

      <!-- BGM + 음성 -->
      <div class="card">
        <div class="card-title">🎵 BGM & 음성</div>
        <div class="field-label">BGM 선택</div>
        <div class="bgm-options">
          <div class="bgm-btn">
            <input type="radio" name="bgm" id="bgm_impact" value="bgm_impact">
            <label for="bgm_impact">
              <button class="bgm-play" onclick="previewBgm('bgm_impact',event)">▶</button>
              Impact
            </label>
          </div>
          <div class="bgm-btn">
            <input type="radio" name="bgm" id="bgm_light" value="bgm_light" checked>
            <label for="bgm_light">
              <button class="bgm-play" onclick="previewBgm('bgm_light',event)">▶</button>
              Light
            </label>
          </div>
          <div class="bgm-btn">
            <input type="radio" name="bgm" id="bgm_future" value="bgm_future">
            <label for="bgm_future">
              <button class="bgm-play" onclick="previewBgm('bgm_future',event)">▶</button>
              Future
            </label>
          </div>
        </div>
        <audio id="bgm-audio" style="display:none"></audio>

        <div class="divider"></div>

        <div class="field-label">TTS 엔진</div>
        <div class="provider-options">
          <label class="provider-btn">
            <input type="radio" name="provider" value="elevenlabs" checked
                   onchange="onProviderChange()">
            <span>ElevenLabs</span>
          </label>
          <label class="provider-btn">
            <input type="radio" name="provider" value="typecast"
                   onchange="onProviderChange()">
            <span>Typecast</span>
          </label>
        </div>

        <label class="field-label">Voice ID
          <span id="voice-hint" style="font-weight:400;color:var(--muted);font-size:12px"></span>
        </label>
        <div class="voice-row">
          <input type="text" id="voice-id" value="{{ default_voice_id }}" placeholder="Voice ID">
          <button type="button" class="btn btn-ghost btn-sm" id="btn-preview"
                  onclick="previewVoice()">🔊 미리듣기</button>
        </div>
        <audio id="voice-audio" style="display:none"></audio>
      </div>

    </div>

    <!-- ── 스크립트 패널 ── -->
    <div class="card" style="display:flex;flex-direction:column">
      <div class="card-title">📝 스크립트</div>

      <div class="script-meta">
        <div>
          <label class="field-label">훅 텍스트 (상단 표시)</label>
          <input type="text" id="s-hook" placeholder="AI 로봇이 탁구 챔피언을 이겼다?">
        </div>
        <div>
          <label class="field-label">BGM 태그</label>
          <input type="text" id="s-bgm-tag" placeholder="bgm_future" readonly
                 style="color:var(--muted);cursor:default">
        </div>
      </div>

      <label class="field-label">해시태그</label>
      <input type="text" id="s-hashtags" placeholder="#AI #로봇 #미래기술 #힙포인사이트">

      <div class="divider"></div>

      <div class="narration-grid">
        <!-- 좌: 생성된 원본 (read-only) -->
        <div class="narration-col">
          <label class="field-label">
            원본 (생성됨)
            <span style="font-weight:400;color:var(--muted)">— 참고용</span>
          </label>
          <textarea class="narration-editor narration-readonly" id="s-narration-orig" readonly
            placeholder="스크립트 생성 버튼을 누르면 여기에 표시됩니다."></textarea>
        </div>

        <!-- 우: 수정 영역 + 팩트체크 -->
        <div class="narration-col">
          <div class="narration-header">
            <label class="field-label" style="margin:0">수정 영역</label>
            <button class="btn btn-ghost btn-sm" type="button"
                    onclick="runFactCheck()" id="btn-factcheck" disabled>📋 팩트체크</button>
          </div>
          <textarea class="narration-editor" id="s-narration"
            placeholder="좌측과 동일한 내용이 들어옵니다. 자유롭게 수정하세요."></textarea>
          <div class="factcheck-result" id="factcheck-result" hidden></div>
        </div>
      </div>
      <div class="hint">* 수정 후 '영상 생성'을 누르면 우측(수정) 내용이 반영됩니다.</div>

      <div class="btn-row" style="margin-top:auto;padding-top:16px">
        <button class="btn btn-ghost"      onclick="generateScript()"     id="btn-gen">✨ 스크립트 생성</button>
        <button class="btn btn-secondary"  onclick="generateScript(true)" id="btn-regen" disabled>🔄 재생성</button>
        <button class="btn btn-primary"    onclick="renderVideo()"        id="btn-render" disabled>🎬 영상 생성</button>
      </div>
    </div>

  </div>

  <!-- 진행 상황 -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-msg">준비 중...</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- 완성 영상 -->
  <div class="output-wrap" id="output-wrap">
    <div class="card-title">🎉 완성 영상</div>
    <div class="output-grid">
      <video id="output-video" controls></video>
      <div class="output-info">
        <div class="output-name" id="output-filename"></div>
        <a id="download-btn" class="btn btn-primary" style="text-decoration:none">⬇ MP4 다운로드</a>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Theme controls ────────────────────────────────────────
function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById('btn-retro').classList.toggle('active', theme === 'retro');
  document.getElementById('btn-classic').classList.toggle('active', theme === 'classic');
  localStorage.setItem('hi-theme', theme);
}
function setMode(mode) {
  document.documentElement.dataset.mode = mode;
  document.getElementById('btn-light').classList.toggle('active', mode === 'light');
  document.getElementById('btn-dark').classList.toggle('active', mode === 'dark');
  localStorage.setItem('hi-mode', mode);
}
// Restore saved preference
(function() {
  const t = localStorage.getItem('hi-theme') || 'retro';
  const m = localStorage.getItem('hi-mode')  || 'light';
  setTheme(t); setMode(m);
})();

// ── TTS provider / voice ──────────────────────────────────
const VOICE_DEFAULTS = {
  elevenlabs: '{{ default_voice_id }}',
  typecast:   '{{ default_typecast_voice_id }}',
};
const VOICE_HINTS = {
  elevenlabs: '예: zgDzx5jLLCqEp6Fl7Kl7',
  typecast:   '예: tc_ 로 시작 (Typecast 콘솔에서 복사)',
};
const _userVoice = { elevenlabs: null, typecast: null };

function currentProvider() {
  return document.querySelector('input[name="provider"]:checked')?.value || 'elevenlabs';
}

function onProviderChange() {
  const p   = currentProvider();
  const inp = document.getElementById('voice-id');
  // 사용자가 직전에 입력해 둔 값이 있으면 살려두고, 아니면 기본값
  _userVoice[p === 'elevenlabs' ? 'typecast' : 'elevenlabs'] = inp.value.trim();
  inp.value = _userVoice[p] || VOICE_DEFAULTS[p] || '';
  document.getElementById('voice-hint').textContent = VOICE_HINTS[p] || '';
}

async function previewVoice() {
  const provider = currentProvider();
  const voice_id = document.getElementById('voice-id').value.trim();
  if (!voice_id) { toast('Voice ID를 입력해주세요', 'error'); return; }

  // narration 1줄 있으면 그걸 샘플로 (없으면 기본 인삿말)
  const narr = document.getElementById('s-narration').value
                  .split('\n').map(s => s.trim()).filter(Boolean)[0];
  const text = narr || '안녕하세요, 힙포인사이트입니다. 오늘도 흥미로운 AI 소식을 들고 왔어요.';

  const btn   = document.getElementById('btn-preview');
  const audio = document.getElementById('voice-audio');
  btn.disabled = true; btn.textContent = '⏳ 생성 중...';
  try {
    const res = await fetch('/api/tts-preview', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ provider, voice_id, text }),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({error: res.statusText}));
      toast('미리듣기 실패: ' + (j.error || res.statusText), 'error');
      return;
    }
    const ctype = res.headers.get('content-type') || '';
    if (ctype.includes('application/json')) {
      const j = await res.json();
      toast('미리듣기 실패: ' + (j.error || ''), 'error');
      return;
    }
    const blob = await res.blob();
    audio.src = URL.createObjectURL(blob);
    audio.play();
  } catch(e) { toast('오류: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '🔊 미리듣기'; }
}

// 초기 hint 세팅
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('voice-hint').textContent = VOICE_HINTS.elevenlabs;
});

// ── BGM preview ───────────────────────────────────────────
function previewBgm(name, e) {
  e.preventDefault(); e.stopPropagation();
  const audio = document.getElementById('bgm-audio');
  if (audio.dataset.name === name && !audio.paused) { audio.pause(); return; }
  audio.src = `/api/bgm/${name}`;
  audio.dataset.name = name;
  audio.play();
}

async function searchNews() {
  const topic = document.querySelector('input[name="news-topic"]:checked')?.value || 'robot';
  const btn   = document.getElementById('btn-news-search');
  btn.disabled = true; btn.textContent = '⏳ 검색 중...';
  const list = document.getElementById('news-list');
  list.innerHTML = '<div class="news-empty">⏳ Brave Search에 묻고 있어요...</div>';

  try {
    const res = await fetch('/api/news-search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ topic, limit: 15, freshness: 'pm' }),
    });
    const data = await res.json();
    if (data.error) {
      // API 키 미설정 등 실패 시 → 샘플로 fallback
      console.warn('news-search error:', data.error);
      list.innerHTML = `<div class="news-empty">검색 실패: ${escapeHtml(data.error)}<br>(샘플 데이터로 표시)</div>`;
      const items = (SAMPLE_NEWS[topic] || []).slice().sort((a,b) => b.date.localeCompare(a.date));
      setTimeout(() => renderNewsList(items, topic), 1200);
      return;
    }
    const items = (data.items || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    renderNewsList(items, topic);
  } catch(e) {
    toast('오류: ' + e.message, 'error');
    list.innerHTML = `<div class="news-empty">오류: ${escapeHtml(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '🔎 뉴스 검색';
  }
}

function renderNewsList(items, topic) {
  const list = document.getElementById('news-list');
  if (!items.length) {
    list.innerHTML = `<div class="news-empty">‘${topic === 'robot' ? '로봇' : 'AI'}’ 주제 결과가 아직 없어요. (검색 API 연결 예정)</div>`;
    return;
  }
  list.innerHTML = items.map(renderNewsItem).join('');
}

function renderNewsItem(it) {
  const links = (it.links || []).map(u =>
    /^https?:\/\//.test(u)
      ? `<li><a href="${escapeHtml(u)}" target="_blank" rel="noopener">${escapeHtml(u)}</a></li>`
      : `<li class="pending">${escapeHtml(u || '검색 필요')}</li>`
  ).join('');

  // 유튜브 원본(롱폼) — 정확한 URL이 있으면 그걸 쓰고, 없으면 키워드 검색 URL(롱폼 필터: >20분)
  // sp=EgIYAg%253D%253D = "Long (>20 min)" 필터
  const ytUrl = it.youtube_url
    ? it.youtube_url
    : `https://www.youtube.com/results?search_query=${encodeURIComponent(it.keyword || '')}&sp=EgIYAg%253D%253D`;
  const ytLabel = it.youtube_url
    ? '유튜브 원본 영상 (직접 링크)'
    : '유튜브 롱폼 검색 (>20분 필터)';

  const sourceRow = it.source
    ? `<div class="news-field">
         <div class="news-field-label">출처</div>
         <div class="news-field-value">${escapeHtml(it.source)}${it.age ? ` · <span style="color:var(--muted)">${escapeHtml(it.age)}</span>` : ''}</div>
       </div>`
    : '';

  const linksLabel = (it.links || []).length > 1 ? '관련 기사 링크' : '기사 본문';

  return `
    <details class="news-item">
      <summary class="news-summary">
        <span class="news-date">${escapeHtml(it.date || '')}</span>
        <span class="news-title">${escapeHtml(it.title || '')}</span>
      </summary>
      <div class="news-body">
        ${sourceRow}
        <div class="news-field">
          <div class="news-field-label">유튜브 검색 키워드</div>
          <div class="news-field-value"><span class="news-keyword">${escapeHtml(it.keyword || '')}</span></div>
        </div>
        <div class="news-field">
          <div class="news-field-label">${ytLabel}</div>
          <div class="news-field-value">
            <a href="${escapeHtml(ytUrl)}" target="_blank" rel="noopener">▶ ${escapeHtml(ytUrl)}</a>
          </div>
        </div>
        <div class="news-field">
          <div class="news-field-label">쇼츠 핵심 포인트</div>
          <div class="news-field-value">${escapeHtml(it.summary || '')}</div>
        </div>
        <div class="news-field">
          <div class="news-field-label">${linksLabel}</div>
          <ol class="news-links">${links}</ol>
        </div>
      </div>
    </details>
  `;
}

// ── Generate script ───────────────────────────────────────
async function generateScript(regen = false) {
  const articles = ['article1','article2','article3']
    .map(id => document.getElementById(id).value.trim())
    .filter(Boolean);
  if (!articles.length) { toast('기사를 하나 이상 입력해주세요', 'error'); return; }

  const btn = document.getElementById('btn-gen');
  btn.disabled = true; btn.textContent = '생성 중...';
  try {
    const res  = await fetch('/api/generate-script', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ articles }),
    });
    const data = await res.json();
    if (data.error) { toast(data.error, 'error'); return; }
    fillScript(data.script);
    document.getElementById('btn-regen').disabled  = false;
    document.getElementById('btn-render').disabled = false;
    toast('스크립트 생성 완료!', 'success');
  } catch(e) { toast('오류: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '✨ 스크립트 생성'; }
}

function fillScript(s) {
  document.getElementById('s-hook').value      = s.hook     || '';
  document.getElementById('s-hashtags').value  = s.hashtags || '';
  document.getElementById('s-bgm-tag').value   = s.bgm_tag  || '';
  const text = (s.narration || []).join('\n');
  document.getElementById('s-narration-orig').value = text;
  document.getElementById('s-narration').value      = text;
  document.getElementById('btn-factcheck').disabled = false;
  const fcBox = document.getElementById('factcheck-result');
  fcBox.hidden = true; fcBox.innerHTML = '';
  const r = document.querySelector(`input[name="bgm"][value="${s.bgm_tag}"]`);
  if (r) r.checked = true;
}

function collectScript() {
  return {
    hook:      document.getElementById('s-hook').value,
    hashtags:  document.getElementById('s-hashtags').value,
    bgm_tag:   document.getElementById('s-bgm-tag').value,
    narration: document.getElementById('s-narration').value
                 .split('\n').map(l => l.trim()).filter(Boolean),
  };
}

// ── Fact check ────────────────────────────────────────────
async function runFactCheck() {
  const articles = ['article1','article2','article3']
    .map(id => document.getElementById(id).value.trim())
    .filter(Boolean);
  const scriptText = document.getElementById('s-narration').value.trim();
  if (!articles.length) { toast('원본 기사가 필요해요', 'error'); return; }
  if (!scriptText)      { toast('검증할 스크립트가 비어있어요', 'error'); return; }

  const btn = document.getElementById('btn-factcheck');
  const box = document.getElementById('factcheck-result');
  btn.disabled = true; btn.textContent = '검증 중...';
  box.hidden = false;
  box.className = 'factcheck-result loading';
  box.innerHTML = '⏳ 기사와 대조 중...';

  try {
    const res  = await fetch('/api/fact-check', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ articles, script: scriptText }),
    });
    const data = await res.json();
    if (data.error) {
      box.className = 'factcheck-result bad';
      box.textContent = '오류: ' + data.error;
      return;
    }
    renderFactCheck(data.result);
  } catch(e) {
    box.className = 'factcheck-result bad';
    box.textContent = '오류: ' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = '📋 팩트체크';
  }
}

function renderFactCheck(r) {
  const box = document.getElementById('factcheck-result');
  const status = r.status || 'warn';
  const icon = { ok: '✅', warn: '⚠️', bad: '🚨' }[status] || '•';
  box.className = `factcheck-result ${status}`;
  let html = `<div class="fc-summary">${icon} ${r.summary || ''}</div>`;
  if (Array.isArray(r.issues) && r.issues.length) {
    html += '<ul class="fc-issues">';
    for (const it of r.issues.slice(0, 5)) {
      html += `<li><span class="fc-line">${escapeHtml(it.line || '')}</span>` +
              `<span class="fc-reason">${escapeHtml(it.reason || '')}</span></li>`;
    }
    html += '</ul>';
  }
  box.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// ── Render video ──────────────────────────────────────────
async function renderVideo() {
  const url1 = document.getElementById('url1').value.trim();
  // url1 비어도 OK — 서버가 스크립트 베이스 모드로 렌더
  const script = collectScript();
  if (!script.narration.length) { toast('나레이션을 입력해주세요', 'error'); return; }

  document.getElementById('btn-render').disabled = true;
  showProgress(true); hideOutput();

  try {
    const res = await fetch('/api/render', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        articles: ['article1','article2','article3'].map(id => document.getElementById(id).value),
        urls:        [url1, document.getElementById('url2').value.trim()],
        start_times: [document.getElementById('start1').value || '00:00:00',
                      document.getElementById('start2').value || '00:00:00'],
        duration:  parseInt(document.getElementById('duration').value) || 55,
        bgm:       document.querySelector('input[name="bgm"]:checked')?.value || 'bgm_light',
        provider:  currentProvider(),
        voice_id:  document.getElementById('voice-id').value.trim(),
        script,
      }),
    });
    const { job_id } = await res.json();
    listenProgress(job_id);
  } catch(e) {
    toast('오류: ' + e.message, 'error');
    document.getElementById('btn-render').disabled = false;
    showProgress(false);
  }
}

// ── SSE progress ──────────────────────────────────────────
function listenProgress(jobId) {
  const es = new EventSource(`/api/progress/${jobId}`);
  es.onmessage = e => {
    const job = JSON.parse(e.data);
    updateProgress(job.progress, job.message);
    if (job.status === 'done') {
      es.close();
      showOutput(job.output);
      document.getElementById('btn-render').disabled = false;
      toast('영상 생성 완료!', 'success');
    } else if (job.status === 'error') {
      es.close();
      showProgress(false);
      document.getElementById('btn-render').disabled = false;
      toast('오류: ' + job.message, 'error');
    }
  };
  es.onerror = () => es.close();
}

// ── UI helpers ────────────────────────────────────────────
function showProgress(v) { document.getElementById('progress-wrap').classList.toggle('show', v); }
function hideOutput()    { document.getElementById('output-wrap').classList.remove('show'); }

function updateProgress(pct, msg) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-msg').textContent  = msg;
  document.getElementById('progress-pct').textContent  = pct + '%';
}

function showOutput(filename) {
  const v = document.getElementById('output-video');
  const a = document.getElementById('download-btn');
  v.src = `/api/download/${filename}`;
  a.href = `/api/download/${filename}`;
  a.setAttribute('download', filename);
  document.getElementById('output-filename').textContent = filename;
  const wrap = document.getElementById('output-wrap');
  wrap.classList.add('show');
  wrap.scrollIntoView({ behavior: 'smooth' });
}

let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
}
</script>
